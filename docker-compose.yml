version: "3"

services:
  postgres:
    image: pgvector/pgvector:pg16
    healthcheck:
      test: pg_isready -U $POSTGRES_USER
      start_interval: 1s
      start_period: 5s
      interval: 5s
      retries: 5
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - ./postgres-volume:/var/lib/postgresql/data
  postgres-setup:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    env_file:
      - .env
    command: ["-path", "/migrations", "-database", "postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:$POSTGRES_PORT/$POSTGRES_DB?sslmode=disable", "up"]
  backend:
    container_name: opengpts-backend
    build:
      context: backend
    ports:
      - "8100:8000" # Backend is accessible on localhost:8100
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./backend:/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_HOST: "postgres"
      MYPORTAL_ENDPOINT: "${MYPORTAL_ENDPOINT:-http://host.docker.internal:8000}"
      MYPORTAL_PUBLIC_ENDPOINT: "${MYPORTAL_PUBLIC_ENDPOINT:-}"
      MYPORTAL_BACKEND_SCHEME: "${MYPORTAL_BACKEND_SCHEME:-http}"
      MYPORTAL_NEWS_LIMIT: "${MYPORTAL_NEWS_LIMIT:-5}"
      MYPORTAL_BACKEND_TIMEOUT: "${MYPORTAL_BACKEND_TIMEOUT:-8}"
    command:
      - --reload
  frontend:
    container_name: opengpts-frontend
    build:
      context: frontend
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/frontend/src
    ports:
      - "5174:5173" # Frontend is accessible on localhost:5174
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
